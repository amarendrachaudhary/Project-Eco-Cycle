<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - EcoCycle AI</title>
    <link rel="stylesheet" href="main.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        .auth-role-toggle {
            display: flex;
            background: var(--gray-100);
            border-radius: var(--radius-lg);
            padding: 4px;
            margin-bottom: 1.5rem;
            gap: 4px;
        }
        .role-btn {
            flex: 1;
            padding: 0.6rem 1rem;
            border-radius: calc(var(--radius-lg) - 2px);
            font-size: 0.875rem;
            font-weight: 600;
            border: none;
            background: transparent;
            color: var(--gray-600);
            cursor: pointer;
            transition: all 0.2s;
        }
        .role-btn.active {
            background: var(--white);
            color: var(--primary);
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .vendor-extra {
            display: none;
            background: rgba(59,130,246,0.05);
            border: 1px solid rgba(59,130,246,0.15);
            border-radius: var(--radius-lg);
            padding: 1rem;
            margin-bottom: 1rem;
        }
        .vendor-extra.show { display: block; }
        .vendor-extra-title {
            font-size: 0.8125rem;
            font-weight: 700;
            color: var(--secondary);
            margin-bottom: 0.75rem;
        }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    </style>
</head>
<body class="auth-page">
    <div class="auth-container" >
        <div class="auth-card">
            <div class="auth-header">
                <div class="logo-icon" style="width:60px;height:60px;margin:0 auto 1rem;color:var(--primary)">
                    <svg viewBox="0 0 50 50" fill="none">
                        <circle cx="25" cy="25" r="23" stroke="currentColor" stroke-width="2"/>
                        <path d="M25 10 L25 40 M15 25 L35 25" stroke="currentColor" stroke-width="2.5"/>
                    </svg>
                </div>
                <h1>Join EcoCycle AI</h1>
                <p>Start earning rewards for recycling</p>
            </div>

            <!-- Role Toggle -->
            <div class="auth-role-toggle">
                <button class="role-btn active" id="roleUser" onclick="setRole('user')">👤 User</button>
                <button class="role-btn" id="roleVendor" onclick="setRole('vendor')">🏢 Vendor</button>
            </div>

            <form class="auth-form" id="signupForm" onsubmit="handleSignup(event)">
                <div class="form-row">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="signupName" placeholder="Alex" required>
                    </div>
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" id="signupUsername" placeholder="JOHN_DOE" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="signupEmail" placeholder="your@email.com" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="signupPassword" placeholder="••••••••" required>
                    </div>
                    <div class="form-group">
                        <label>Phone</label>
                        <input type="tel" id="signupPhone" placeholder="9876543210">
                    </div>
                </div>
                <div class="form-group">
                    <label>City</label>
                    <input type="text" id="signupCity" placeholder="Delhi, Aligarh, Noida…">
                </div>

                <!-- Vendor-only extra fields -->
                <div class="vendor-extra" id="vendorExtra">
                    <div class="vendor-extra-title">🏢 Vendor Business Details</div>
                    <div class="form-group">
                        <label>Business Name</label>
                        <input type="text" id="vendorName" placeholder="GreenCycle Solutions">
                    </div>
                    <div class="form-group">
                        <label>Materials Accepted</label>
                        <input type="text" id="vendorMaterials" placeholder="Plastic, Paper, Metal, E-Waste…">
                    </div>
                    <div class="form-group">
                        <label>Business Address</label>
                        <input type="text" id="vendorAddress" placeholder="Sector 12, Noida">
                    </div>
                </div>

                <div id="signupError" style="color:var(--error);font-size:0.875rem;display:none;margin-bottom:0.5rem;"></div>
                <button type="submit" class="btn-primary full-width" id="signupBtn">Create Account</button>
                <p class="auth-footer">Already have an account? <a href="login.html">Login</a></p>
            </form>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script>
        let selectedRole = 'user';

        function setRole(role) {
            selectedRole = role;
            document.getElementById('roleUser').classList.toggle('active', role === 'user');
            document.getElementById('roleVendor').classList.toggle('active', role === 'vendor');
            document.getElementById('vendorExtra').classList.toggle('show', role === 'vendor');
        }

        async function handleSignup(e) {
            e.preventDefault();
            const btn = document.getElementById('signupBtn');
            const errEl = document.getElementById('signupError');

            btn.textContent = 'Creating account…';
            btn.disabled = true;
            errEl.style.display = 'none';

            const payload = {
                username: document.getElementById('signupUsername').value,
                email: document.getElementById('signupEmail').value,
                password: document.getElementById('signupPassword').value,
                full_name: document.getElementById('signupName').value,
                phone: document.getElementById('signupPhone').value,
                city: document.getElementById('signupCity').value,
                role: selectedRole
            };

            try {
                const res = await fetch('http://localhost:8000/api/auth/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || 'Signup failed');

                localStorage.setItem('eco_token', data.access_token);
                localStorage.setItem('eco_user', JSON.stringify(data.user));

                // If vendor, also register their profile
                if (selectedRole === 'vendor' && document.getElementById('vendorName').value) {
                    await fetch('http://localhost:8000/api/vendors/register', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': 'Bearer ' + data.access_token
                        },
                        body: JSON.stringify({
                            name: document.getElementById('vendorName').value,
                            phone: payload.phone,
                            city: payload.city,
                            address: document.getElementById('vendorAddress').value,
                            materials: document.getElementById('vendorMaterials').value
                        })
                    });
                }

                window.EcoCycle.showToast('Account created! Welcome 🎉', 'success');
                setTimeout(() => {
                    location.href = selectedRole === 'vendor' ? 'vendor-dashboard.html' : 'dashboard.html';
                }, 800);
            } catch (err) {
                // Demo fallback
                localStorage.setItem('eco_demo', JSON.stringify({ email: payload.email, role: selectedRole }));
                window.EcoCycle.showToast('Account created (demo mode) 🎉', 'success');
                setTimeout(() => {
                    location.href = selectedRole === 'vendor' ? 'vendor-dashboard.html' : 'dashboard.html';
                }, 800);
            }
        }
    </script>
</body>
</html>
