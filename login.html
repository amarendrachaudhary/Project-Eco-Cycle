<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - EcoCycle AI</title>
    <link rel="stylesheet" href="main.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        .auth-role-toggle {
            display: flex;
            background: var(--gray-100);
            border-radius: var(--radius-lg);
            padding: 4px;
            margin-bottom: 1.5rem;
            gap: 4px;
        }
        .role-btn {
            flex: 1;
            padding: 0.6rem 1rem;
            border-radius: calc(var(--radius-lg) - 2px);
            font-size: 0.875rem;
            font-weight: 600;
            border: none;
            background: transparent;
            color: var(--gray-600);
            cursor: pointer;
            transition: all 0.2s;
        }
        .role-btn.active {
            background: var(--white);
            color: var(--primary);
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .demo-hint {
            background: rgba(16,185,129,0.06);
            border: 1px solid rgba(16,185,129,0.2);
            border-radius: var(--radius-lg);
            padding: 0.875rem 1rem;
            margin-bottom: 1.25rem;
            font-size: 0.8125rem;
            color: var(--gray-600);
            line-height: 1.5;
        }
        .demo-hint strong { color: var(--primary); }
        .demo-creds { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.5rem; }
        .demo-cred-btn {
            font-size: 0.75rem; padding: 0.3rem 0.75rem;
            background: rgba(16,185,129,0.1); color: var(--primary);
            border: 1px solid rgba(16,185,129,0.2); border-radius: var(--radius-full);
            cursor: pointer; font-weight: 600;
        }
        .demo-cred-btn:hover { background: rgba(16,185,129,0.2); }
    </style>
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="logo-icon" style="width:60px;height:60px;margin:0 auto 1rem;color:var(--primary)">
                    <svg viewBox="0 0 50 50" fill="none">
                        <circle cx="25" cy="25" r="23" stroke="currentColor" stroke-width="2"/>
                        <path d="M25 10 L25 40 M15 25 L35 25" stroke="currentColor" stroke-width="2.5"/>
                    </svg>
                </div>
                <h1>Welcome Back</h1>
                <p>Login to continue your sustainability journey</p>
            </div>

            <!-- Role Toggle -->
            <div class="auth-role-toggle">
                <button class="role-btn active" id="roleUser" onclick="setRole('user')">👤 User</button>
                <button class="role-btn" id="roleVendor" onclick="setRole('vendor')">🏢 Vendor</button>
            </div>

            <!-- Demo hint -->
            <div class="demo-hint">
                <strong>🚀 Demo Mode</strong> — use any email &amp; password to log in. Backend connects to FastAPI.<br>
                <div class="demo-creds">
                    <button class="demo-cred-btn" onclick="fillDemo('demo@eco.com','demo123')">User Demo</button>
                    <button class="demo-cred-btn" onclick="fillDemo('vendor@eco.com','demo123')">Vendor Demo</button>
                </div>
            </div>

            <form class="auth-form" id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="loginEmail" placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" placeholder="••••••••" required>
                </div>
                <div id="loginError" style="color:var(--error);font-size:0.875rem;display:none;margin-bottom:0.5rem;"></div>
                <button type="submit" class="btn-primary full-width" id="loginBtn">Login</button>
                <p class="auth-footer">Don't have an account? <a href="signup.html">Sign up</a></p>
            </form>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script>
        let selectedRole = 'user';

        function setRole(role) {
            selectedRole = role;
            document.getElementById('roleUser').classList.toggle('active', role === 'user');
            document.getElementById('roleVendor').classList.toggle('active', role === 'vendor');
        }

        function fillDemo(email, pass) {
            document.getElementById('loginEmail').value = email;
            document.getElementById('loginPassword').value = pass;
            if (email.includes('vendor')) setRole('vendor');
            else setRole('user');
        }

        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const errEl = document.getElementById('loginError');
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            btn.textContent = 'Logging in…';
            btn.disabled = true;
            errEl.style.display = 'none';

            try {
                const body = new URLSearchParams({ username: email, password });
                const res = await fetch('http://localhost:8000/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || 'Login failed');

                localStorage.setItem('eco_token', data.access_token);
                localStorage.setItem('eco_user', JSON.stringify(data.user));
                window.EcoCycle.showToast('Welcome back! 👋', 'success');

                setTimeout(() => {
                    const role = data.user.role || selectedRole;
                    location.href = role === 'vendor' ? 'vendor-dashboard.html' : 'dashboard.html';
                }, 800);
            } catch (err) {
                // Fallback: allow demo login offline
                localStorage.setItem('eco_demo', JSON.stringify({ email, role: selectedRole }));
                window.EcoCycle.showToast('Logged in (demo mode) 👋', 'success');
                setTimeout(() => {
                    location.href = selectedRole === 'vendor' ? 'vendor-dashboard.html' : 'dashboard.html';
                }, 800);
            }
        }
    </script>
</body>
</html>
